<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Login</title>
    <link rel="stylesheet" href="../../../style.css">
</head>

<body class="auth-page">
    <main>
        <div class="auth-container">

            <!-- formulario inicio de sesión -->
            <form id="form" class="auth-form">

                <h1>Food Store</h1>
                <h2>Iniciar Sesión</h2>

                <label for="email">Email:</label>
                <input type="email" name="email" id="email" autocomplete="off" placeholder="tucorreo@ejemplo.com" required>

                <label for="password">Contraseña:</label>
                <input type="password" name="password" id="password" autocomplete="off" placeholder="Mínimo 8 caracteres" required>

                <button type="submit">Ingresar</button>

                <p class="auth-link">
                    ¿No tenés cuenta?
                    <a href="../registro/registro.html">Registrate acá</a>
                </p>

            </form>

        </div>
    </main>

    <script type="module" src="login.ts"></script>
</body>

</html>
