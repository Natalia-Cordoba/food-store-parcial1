<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Register</title>
    <link rel="stylesheet" href="../../../style.css">
</head>

<body class="auth-page">
    <main>
        <div class="auth-container">

            <!-- formulario registro -->
            <form id="register" class="auth-form">

                <h1>Food Store</h1>
                <h2>Registrarse</h2>

                <label for="email">Email:</label>
                <input type="email" name="email" id="email" placeholder="tucorreo@ejemplo.com" required>

                <label for="password">Contraseña:</label>
                <input type="password" name="password" id="password" placeholder="Mínimo 8 caracteres" required>

                <button type="submit">Registrarse</button>

                <p class="auth-link">
                    ¿Ya tenés cuenta?
                    <a href="../login/login.html">Ingresá acá</a>
                </p>

            </form>

        </div>
    </main>

    <script type="module" src="registro.ts"></script>
</body>

</html>
